<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Result | Online Question Bank System</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body data-page="result">
  <div class="content-layout">
    <div class="page-shell">
      <header class="topbar">
        <a href="/home.html" class="brand">
          <img class="brand-mark" src="/images/quiz-logo.jpg" alt="Quiz logo">
          <span class="brand-text"><span>Online Question Bank</span><small>Return home</small></span>
        </a>
        <nav class="nav-actions">
          <a class="btn btn-secondary" href="/dashboard.html">Dashboard</a>
          <a class="btn btn-secondary" href="/history.html">History</a>
          <a class="btn btn-secondary" href="/leaderboard.html">Leaderboard</a>
          <button class="btn btn-danger" type="button" data-action="logout">Logout</button>
        </nav>
      </header>

      <main class="card" style="max-width:560px;margin:0 auto;text-align:center">
        <div class="header-row" style="justify-content:center;flex-direction:column;gap:8px">
          <span class="eyebrow">Quiz completed</span>
          <h1 class="page-title" style="margin:8px 0">Your Result</h1>
          <div id="resultStatus" class="status-chip">Result</div>
        </div>

        <div id="resultScore" class="result-score">0/0</div>
        <p id="resultMessage" class="result-message"></p>
        <div id="resultSummary" class="summary-grid" style="margin-top:16px"></div>

        <div class="inline-actions" style="justify-content:center;margin-top:24px">
          <a class="btn btn-primary" href="/dashboard.html">Back to Dashboard</a>
          <a class="btn btn-outline" href="/quiz.html">Try Again</a>
        </div>
      </main>
    </div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
