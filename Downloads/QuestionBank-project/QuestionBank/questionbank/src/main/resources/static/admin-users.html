<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Users · QBank Admin</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="page-shell content-layout">

    <header class="topbar">
      <a href="/admin-dashboard.html" class="brand">
        <img src="/logo.png" alt="QBank" class="brand-mark" onerror="this.style.display='none'" />
        <div class="brand-text">
          <span>QBank</span>
          <small>Admin Console</small>
        </div>
      </a>
      <nav class="nav-actions">
        <a href="/admin-dashboard.html" class="btn btn-secondary">Dashboard</a>
        <a href="/admin-questions.html" class="btn btn-secondary">Questions</a>
        <a href="/admin-attempts.html"  class="btn btn-secondary">Attempts</a>
        <button id="logoutBtn" class="btn btn-danger" type="button">Log out</button>
      </nav>
    </header>

    <section class="welcome-banner">
      <span class="eyebrow">User management</span>
      <h1 class="page-title">Registered users</h1>
      <p class="welcome-note">Promote, demote, or remove accounts. Be careful — deletions can't be undone.</p>
    </section>

    <section class="metric-strip" style="grid-template-columns: repeat(3, minmax(0, 1fr));">
      <div class="metric-card"><strong id="mTotal">—</strong><span>Total users</span></div>
      <div class="metric-card"><strong id="mAdmins">—</strong><span>Administrators</span></div>
      <div class="metric-card"><strong id="mVerified">—</strong><span>Email verified</span></div>
    </section>

    <section class="card" style="margin-top: 24px;">
      <span class="eyebrow">Search</span>
      <div style="display: flex; gap: 12px; margin-top: 12px;">
        <input id="searchBox" type="text" placeholder="Filter by name or email…"
               style="flex: 1; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 8px;" />
      </div>
    </section>

    <section class="card" style="margin-top: 24px;">
      <h2 class="section-title">All users</h2>
      <div id="userTable" style="margin-top: 16px; overflow-x: auto;">
        <p class="loading-state">Loading...</p>
      </div>
    </section>

  </div>

  <script>
  const token = localStorage.getItem("qbankToken");
  const user  = JSON.parse(localStorage.getItem("qbankUser") || "{}");
  const role  = user.role;
  const myId  = String(user.id || ""); 

  if (!token || role !== "ROLE_ADMIN") {
    window.location.href = "/login.html";
  }
    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.clear();
      window.location.href = "/login.html";
    });

    let allUsers = [];

    async function loadUsers() {
      try {
        const res = await fetch("/api/admin/users", { headers: { "X-Admin-Token": token } });
        if (!res.ok) throw new Error("Unable to load users (" + res.status + ").");
        allUsers = await res.json();
        renderMetrics();
        renderTable(allUsers);
      } catch (err) {
        document.getElementById("userTable").innerHTML =
          '<p class="empty-state">' + err.message + '</p>';
      }
    }

    function renderMetrics() {
      document.getElementById("mTotal").textContent    = allUsers.length;
      document.getElementById("mAdmins").textContent   = allUsers.filter(u => u.role === "ROLE_ADMIN").length;
      document.getElementById("mVerified").textContent = allUsers.filter(u => u.emailVerified).length;
    }

    function renderTable(users) {
      const el = document.getElementById("userTable");
      if (!users.length) {
        el.innerHTML = '<p class="empty-state">No users found.</p>';
        return;
      }
      el.innerHTML = `
        <table style="width: 100%; border-collapse: collapse;">
          <thead>
            <tr style="text-align: left; border-bottom: 2px solid #e5e7eb;">
              <th style="padding: 10px 8px;">ID</th>
              <th style="padding: 10px 8px;">Name</th>
              <th style="padding: 10px 8px;">Email</th>
              <th style="padding: 10px 8px;">Role</th>
              <th style="padding: 10px 8px;">Verified</th>
              <th style="padding: 10px 8px; text-align: right;">Actions</th>
            </tr>
          </thead>
          <tbody>
            ${users.map(u => `
              <tr style="border-bottom: 1px solid #f1f5f9;">
                <td style="padding: 10px 8px;">${u.id}</td>
                <td style="padding: 10px 8px;">${escapeHtml(u.fullName || "—")}</td>
                <td style="padding: 10px 8px;">${escapeHtml(u.email || "—")}</td>
                <td style="padding: 10px 8px;">
                  <span style="padding: 3px 10px; border-radius: 12px; font-size: 12px;
                    background: ${u.role === 'ROLE_ADMIN' ? '#ddd6fe' : '#e0f2fe'};
                    color: ${u.role === 'ROLE_ADMIN' ? '#5b21b6' : '#075985'};">
                    ${u.role === 'ROLE_ADMIN' ? 'Admin' : 'User'}
                  </span>
                </td>
                <td style="padding: 10px 8px;">${u.emailVerified ? '✓' : '—'}</td>
                <td style="padding: 10px 8px; text-align: right;">
                  ${String(u.id) === myId
                    ? '<span style="color:#6b7280; font-size:12px;">(you)</span>'
                    : `
                      <button class="btn btn-secondary" onclick="toggleRole(${u.id}, '${u.role}')"
                              style="padding: 6px 12px; font-size: 13px;">
                        ${u.role === 'ROLE_ADMIN' ? 'Demote' : 'Promote'}
                      </button>
                      <button class="btn btn-danger" onclick="deleteUser(${u.id}, '${escapeHtml(u.email)}')"
                              style="padding: 6px 12px; font-size: 13px; margin-left: 6px;">
                        Delete
                      </button>
                    `}
                </td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    async function toggleRole(id, currentRole) {
      const newRole = currentRole === "ROLE_ADMIN" ? "ROLE_USER" : "ROLE_ADMIN";
      if (!confirm(`Change this user's role to ${newRole}?`)) return;
      try {
        const res = await fetch(`/api/admin/users/${id}/role`, {
          method: "PATCH",
          headers: { "X-Admin-Token": token, "Content-Type": "application/json" },
          body: JSON.stringify({ role: newRole })
        });
        if (!res.ok) throw new Error("Failed (" + res.status + ").");
        await loadUsers();
      } catch (err) {
        alert(err.message);
      }
    }

    async function deleteUser(id, email) {
      if (!confirm(`Delete user "${email}"? This cannot be undone.`)) return;
      try {
        const res = await fetch(`/api/admin/users/${id}`, {
          method: "DELETE",
          headers: { "X-Admin-Token": token }
        });
        if (!res.ok) throw new Error("Failed (" + res.status + ").");
        await loadUsers();
      } catch (err) {
        alert(err.message);
      }
    }

    document.getElementById("searchBox").addEventListener("input", (e) => {
      const q = e.target.value.toLowerCase().trim();
      if (!q) return renderTable(allUsers);
      renderTable(allUsers.filter(u =>
        (u.fullName || "").toLowerCase().includes(q) ||
        (u.email || "").toLowerCase().includes(q)
      ));
    });

    function escapeHtml(s) {
      return String(s ?? "")
        .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
        .replaceAll('"',"&quot;").replaceAll("'","&#39;");
    }

    loadUsers();
  </script>
</body>
</html>
